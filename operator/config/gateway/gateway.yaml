# Example Gateway used as the parentRef for HTTPRoutes generated by
# the TunnelReconciler. NOT included in `config/default` because the
# right `gatewayClassName` depends on which Gateway API implementation
# is installed in the cluster (Envoy Gateway, Contour, Istio, etc.).
#
# Apply it explicitly after picking the class for your cluster, e.g.:
#   kubectl apply -k config/gateway/
#
# Then set XPOS_GATEWAY_NAMESPACE/XPOS_GATEWAY_NAME on the operator
# Deployment if you change the namespace/name below.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: xpos-gateway
  namespace: xpos-system
spec:
  # CHANGE ME to match your cluster's installed GatewayClass.
  # Common values:
  #   - eg            (Envoy Gateway)
  #   - contour       (Project Contour)
  #   - istio         (Istio)
  #   - cilium        (Cilium GW API)
  gatewayClassName: eg
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
