# Dedicated ServiceAccount used by the relay (data-plane) Pods. The
# permissions are scoped tightly to what the relay actually needs:
# - renew its own Lease (own pod name)
# - create/delete Agent and Tunnel CRs in its own namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: relay
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: relay
  namespace: system
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, create, update, patch, watch, list]
  - apiGroups: [xpos.xpos-io.com]
    resources: [agents, tunnels]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: relay
  namespace: system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: relay
subjects:
  - kind: ServiceAccount
    name: relay
    namespace: system
