---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: agents.xpos.xpos-io.com
spec:
  group: xpos.xpos-io.com
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    shortNames:
      - xagent
    singular: agent
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.identity
          name: Identity
          type: string
        - jsonPath: .spec.relayPod.name
          name: Relay
          type: string
        - jsonPath: .status.lastHeartbeat
          name: LastSeen
          type: date
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: Agent is an active xpos agent session.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                AgentSpec describes a connected agent session as observed by a relay
                (data-plane) pod. The relay creates one Agent per active control
                connection and deletes it when the agent disconnects. A separate
                Lease (coordination.k8s.io) is used as the heartbeat; the operator
                garbage collects Agents whose corresponding relay Lease has expired.
              properties:
                identity:
                  description: |-
                    Identity is the authenticated identity of the agent (e.g. the
                    GitHub login it presented). Used to derive its tunnel
                    hostname.
                  minLength: 1
                  type: string
                relayPod:
                  description: |-
                    RelayPod is the data-plane pod that currently owns the
                    control connection.
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                    - name
                    - namespace
                  type: object
                sessionID:
                  description: |-
                    SessionID uniquely identifies this control-channel session.
                    Regenerated on every reconnect so we can disambiguate agents
                    that share an Identity.
                  minLength: 1
                  type: string
              required:
                - identity
                - relayPod
                - sessionID
              type: object
            status:
              description: AgentStatus carries observed state.
              properties:
                conditions:
                  description: Conditions follow the standard k8s conditions pattern.
                  items:
                    description:
                      Condition contains details for one aspect of the current
                      state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                lastHeartbeat:
                  description: |-
                    LastHeartbeat mirrors the renewTime of the relay's Lease. The
                    controller updates this field opportunistically; the
                    authoritative heartbeat is the Lease itself.
                  format: date-time
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
